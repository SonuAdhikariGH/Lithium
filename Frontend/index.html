<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="app.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap"
      rel="stylesheet"
    />
    <title>Lithium | Post your insights</title>
  </head>
  <body>
    <!-- Home section -->
    <!-- header -->
    <section class="home-section">
      <!-- title/description -->
      <div class="para-container">
        <p class="main-para">Lithium Feed</p>
        <p class="main-desc">
          Start posting anything you'd like, No pause & No hesitation.
        </p>
      </div>

      <!-- get started button -->
      <div class="btn-container">
        <button id="getStarted">Get Started</button>
      </div>
    </section>

    <!-- Lithium Guide -->
    <section class="lithium-guide">
      <!-- header -->
      <p class="para-guide">Lithium Guide</p>

      <div class="pointer-container">
        <!-- stylable pointers -->
        <!-- first -->
        <span class="point-one">No login, start posting directly</span>

        <!-- second -->
        <span class="point-two">Access posts via feed</span>

        <!-- third -->
        <span class="point-three">No downtime mostly</span>

        <!-- fourth -->
        <span class="point-four">Complete encryption</span>
      </div>
    </section>

    <!-- about us section -->
    <section class="about-us">
      <!-- para about us -->
      <p class="aboutUs-para">Contact Dev</p>

      <!-- link container -->
      <div class="link-container">
        <!-- twitter - X -->
        <nav class="twitter">
          <a href="https://x.com/sonutwts">X - Twitter</a>
        </nav>

        <!-- Email -->
        <nav class="email">
          <a href="sonuadhikarionly@gmail.com">Email</a>
        </nav>

        <!-- Instagram -->
        <nav class="instagram">
          <a href="https://www.instagram.com/jsxrohit/">Instagram</a>
        </nav>
      </div>
    </section>

    <div class="copyright">
      <p>© 2026 Lithium Feed. All rights reserved.</p>
    </div>
  </body>
</html>
